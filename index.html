<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwizly | Study Smarter</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Font: Lexend -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

    <!-- Navigation / Header -->
    <nav>
        <div class="nav-container">
            <h1 onclick="showPage('landing')">Kwizly</h1>
            <div class="nav-right">
                <div class="streak-container">
                    <span id="streak-flame">🔥</span> <span id="streak-count">0</span>
                </div>
                <button id="theme-toggle" onclick="toggleDarkMode()">🌓</button>
            </div>
        </div>
    </nav>

    <main id="app-container">
        
        <!-- PAGE 1: LANDING PAGE -->
        <section id="landing-page" class="page active">
            <div class="hero">
                <h1 class="large-title">Kwizly</h1>
                <p class="tagline">study smarter, faster, easier</p>
                <div class="hero-buttons">
                    <button class="btn-primary" onclick="showPage('dashboard')">Start Studying</button>
                </div>
            </div>
            <div class="info-grid">
                <div class="info-card">
                    <h3>Tutorial</h3>
                    <p>1. Create a deck. 2. Add cards. 3. Study or Quiz yourself!</p>
                </div>
                <div class="info-card">
                    <h3>About</h3>
                    <p>No accounts. No ads. Just pure learning stored in your browser.</p>
                </div>
            </div>
        </section>

        <!-- PAGE 2: DASHBOARD (DECK PAGE) -->
        <section id="dashboard" class="page">
            <div class="section-header">
                <h2>Your Decks</h2>
                <div class="header-actions">
                    <button class="btn-secondary" onclick="document.getElementById('file-import').click()">Import</button>
                    <input type="file" id="file-import" hidden onchange="importDeck(event)">
                    <button class="btn-primary" onclick="showPage('create-deck')">+ New Deck</button>
                </div>
            </div>
            <div id="deck-list" class="deck-grid">
                <!-- Decks will be injected here by JS -->
            </div>
        </section>

        <!-- PAGE 3: CREATE DECK -->
        <section id="create-deck" class="page">
            <h2>Create New Deck</h2>
            <div class="form-group">
                <input type="text" id="deck-title-input" placeholder="Deck Title (e.g., Biology 101)">
                <textarea id="deck-desc-input" placeholder="Description (optional)"></textarea>
            </div>
            <div id="card-inputs-container">
                <div class="card-input-row">
                    <input type="text" placeholder="Question" class="q-input">
                    <input type="text" placeholder="Answer" class="a-input">
                </div>
            </div>
            <button class="btn-secondary" onclick="addCardInput()">+ Add Another Card</button>
            <div class="form-actions">
                <button class="btn-ghost" onclick="showPage('dashboard')">Cancel</button>
                <button class="btn-primary" onclick="saveNewDeck()">Save Deck</button>
            </div>
        </section>

        <!-- PAGE 4: FLASHCARD MODE -->
        <section id="flashcard-mode" class="page">
            <div class="mode-header">
                <button onclick="showPage('dashboard')">← Back</button>
                <h2 id="study-deck-title">Study</h2>
                <div id="study-progress">1 / 10</div>
            </div>
            <div class="flashcard-container">
                <div class="flashcard" id="main-card" onclick="this.classList.toggle('flipped')">
                    <div class="card-front">
                        <p id="card-front-text">Front</p>
                    </div>
                    <div class="card-back">
                        <p id="card-back-text">Back</p>
                    </div>
                </div>
            </div>
            <div class="study-controls">
                <button class="btn-secondary" onclick="prevCard()">Previous</button>
                <div class="rating-buttons" id="rating-btns">
                    <button class="rate-hard" onclick="nextCard('hard')">Hard</button>
                    <button class="rate-good" onclick="nextCard('good')">Good</button>
                    <button class="rate-easy" onclick="nextCard('easy')">Easy</button>
                </div>
                <button class="btn-secondary" onclick="nextCard()">Next</button>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
